<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product to Order</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='orders.css') }}">
</head>
<body>

<div class="layout">

    <!-- ===== Sidebar ===== -->
    <aside class="sidebar">
        <h2>Meraki</h2>

        <a href="/">Home</a>
        <a href="/products">Products</a>
        <a href="/orders"class="active">Orders</a>

        {% if role == "seller" %}
            <a href="/branches">Branches</a>
            <a href="/employees">Employees</a>
        {% endif %}
    </aside>

    <!-- ===== Content ===== -->
    <div class="container">

        <h1>Add Product to Order {{ order_id }}</h1>

        <form method="POST">
            <select name="product_id" required>
                <option value="">Select Product</option>
                {% for p in products %}
                    <option value="{{ p[0] }}">{{ p[1] }}</option>
                {% endfor %}
            </select>

            <input type="number" name="quantity" placeholder="Quantity" required>

            <button type="submit">Add</button>
        </form>

        <a class="back-link" href="{{ url_for('orders.orders') }}">⬅ Back to Orders</a>

    </div>
</div>

</body>
</html>
