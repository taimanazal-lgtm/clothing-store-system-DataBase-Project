<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Employee</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='employees.css') }}">
</head>
<body>

<div class="layout">

    <!-- ===== Sidebar ===== -->
    <aside class="sidebar">
        <h2>Meraki</h2>
        <a href="/">Home</a>
        <a href="/products">Products</a>
        <a href="/orders">Orders</a>
        <a href="/branches">Branches</a>
        <a href="/employees" class="active">Employees</a>
    </aside>

    <!-- ===== Content ===== -->
    <div class="container">

        <h1>Edit Employee</h1>

        <form method="POST">
            <input type="text" name="employee_name" value="{{ emp.employee_name }}" required>
            <input type="text" name="position" value="{{ emp.position }}" required>
            <input type="number" step="0.01" name="salary" value="{{ emp.salary }}" required>
            <input type="number" name="working_hours" value="{{ emp.working_hours }}" required>

            <select name="branch_id" required>
                {% for b in branches %}
                    <option value="{{ b.branch_ID }}"
                        {% if b.branch_ID == emp.branch_ID %}selected{% endif %}>
                        {{ b.branch_name }}
                    </option>
                {% endfor %}
            </select>

            <button type="submit">Update</button>
        </form>

    </div>
</div>

</body>
</html>
