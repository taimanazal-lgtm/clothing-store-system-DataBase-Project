<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Order</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='orders.css') }}">
</head>
<body>
<div class="layout">

    <!-- ===== Sidebar ===== -->
    <aside class="sidebar">
        <h2>Meraki</h2>
        <a href="/">Home</a>
        <a href="/products">Products</a>
        <a href="/orders"class="active">Orders</a>
        {% if role == "seller" %}
            <a href="/branches">Branches</a>
            <a href="/employees">Employees</a>
        {% endif %}
    </aside>

    <!-- ===== Content ===== -->
    <div class="container">
        <h1>Edit Order</h1>

        <form method="POST">
            <input type="date" name="order_date" value="{{ order[1] }}" required>
            <input type="text" name="payment_status" value="{{ order[2] }}" placeholder="Payment Status" required>
            <input type="text" name="shipping_status" value="{{ order[3] }}" placeholder="Shipping Status" required>

            <select name="customer" required>
                {% for c in customers %}
                    <option value="{{ c[0] }}" {% if c[0] == order[4] %}selected{% endif %}>
                        {{ c[1] }}
                    </option>
                {% endfor %}
            </select>

            <button type="submit">Update Order</button>
        </form>

        <a href="{{ url_for('orders.orders') }}">← Back to Orders</a>
    </div>
</div>
</body>
</html>
