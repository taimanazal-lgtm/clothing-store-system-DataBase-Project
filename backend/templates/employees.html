<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employees</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='employees.css') }}">
</head>
<body>

<div class="layout">

    <!-- ===== Sidebar ===== -->
    <aside class="sidebar">
        <h2>Meraki</h2>
        <a href="/">Home</a>
        <a href="/products">Products</a>
        <a href="/orders">Orders</a>
        <a href="/branches">Branches</a>
        <a href="/employees" class="active">Employees</a>
    </aside>

    <!-- ===== Content ===== -->
    <div class="container">

        <h1>Employees</h1>

        <!-- Add Employee Form -->
        <form method="POST">
            <input type="hidden" name="action" value="add">
            <input type="number" name="employee_id" placeholder="Employee ID" required>
            <input type="text" name="employee_name" placeholder="Employee Name" required>
            <input type="text" name="position" placeholder="Position" required>
            <input type="number" step="0.01" name="salary" placeholder="Salary" required>
            <input type="number" name="working_hours" placeholder="Working Hours" required>

            <select name="branch_id" required>
                <option value="">Select Branch</option>
                {% for b in branches %}
                    <option value="{{ b.branch_ID }}">{{ b.branch_name }}</option>
                {% endfor %}
            </select>


            <button type="submit">
                {{ 'Edit Employee' if edit_employee else 'Add Employee' }}
            </button>

        </form>

        <!-- Employees Table -->
        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Position</th>
                <th>Salary</th>
                <th>Hours</th>
                <th>Branch</th>
                <th>Actions</th>
            </tr>

            {% for e in employees %}
            <tr>
                <td>{{ e.employee_ID }}</td>
                <td>{{ e.employee_name }}</td>
                <td>{{ e.position }}</td>
                <td>{{ e.salary }}</td>
                <td>{{ e.working_hours }}</td>
                <td>{{ e.branch_name }}</td>
                <td>
                    <a href="/employees/edit/{{ e.employee_ID }}">Edit</a>
                    |
                <form method="POST"
                    action="/employees/delete/{{ e.employee_ID }}"
                    style="display:inline;"
                    onsubmit="return confirm('Are you sure you want to delete?')">
                    <button type="submit">Delete</button>
                </form>


                </td>
            </tr>
            {% endfor %}
        </table>

    </div>
</div>

</body>
</html>
