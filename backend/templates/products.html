<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='employees.css') }}">
</head>
<body>

<div class="layout">

    <!-- ===== Sidebar ===== -->
    <aside class="sidebar">
        <h2>Meraki</h2>

        <a href="/">Home</a>
        <a href="/products" class="active">Products</a>
        <a href="/orders">Orders</a>

        {% if role == "seller" %}
            <a href="/branches">Branches</a>
            <a href="/employees">Employees</a>
        {% endif %}
    </aside>

    <!-- ===== Content ===== -->
    <div class="container">

        <h1>Products</h1>

        <!-- Add Product Form -->
        <form method="POST" enctype="multipart/form-data">
            <input type="number" name="product_id" placeholder="Product ID" required>
            <input type="text" name="title" placeholder="Product Title" required>

            <select name="category" required>
                <option value="">Select Category</option>
                {% for c in categories %}
                    <option value="{{ c[0] }}">{{ c[1] }}</option>
                {% endfor %}
            </select>

            <select name="supplier" required>
                <option value="">Select Supplier</option>
                {% for s in suppliers %}
                    <option value="{{ s[0] }}">{{ s[1] }}</option>
                {% endfor %}
            </select>

            <input type="number" step="0.01" name="price" placeholder="Price" required>
            <input type="number" name="quantity" placeholder="Quantity" required>
            <input type="text" name="colors" placeholder="Colors (e.g. Red,Black,White)" required>
            <input type="text" name="sizes" placeholder="Sizes (e.g. S,M,L)" required>
            <input type="file" name="images[]" multiple accept="image/*">

            <button type="submit">Add Product</button>
        </form>

        <!-- Products Table -->
        <table>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Category</th>
                <th>Supplier</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Colors</th>
                <th>Sizes</th>
                <th>Actions</th>
            </tr>

            {% for p in products %}
            <tr>
                <td>{{ p[0] }}</td>
                <td>{{ p[1] }}</td>
                <td>{{ p[2] }}</td>
                <td>{{ p[3] }}</td>
                <td>{{ p[4] }}</td>
                <td>{{ p[5] }}</td>
                <td>{{ p[6] }}</td>
                <td>{{ p[7] }}</td>
                <td>
                    <a href="/products/edit/{{ p[0] }}">Edit</a>
                    |
                    <form method="POST" action="{{ url_for('products.delete_product', pid=p[0]) }}" style="display:inline;">
                        <button type="submit" onclick="return confirm('Delete this product?')">
                            Delete
                        </button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>

    </div>
</div>

</body>
</html>
